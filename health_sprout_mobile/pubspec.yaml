name: health_sprout_mobile
description: Health Sprout — Personal Health Advisor with Health Connect & Gemini AI
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Health data ───────────────────────────────────────────────────────────
  health: ^12.0.0               # Health Connect (Android) + HealthKit (iOS)
  permission_handler: ^11.3.1   # Runtime permissions

  # ── Local database ────────────────────────────────────────────────────────
  sqflite: ^2.3.3               # SQLite — persistent health metric history
  path_provider: ^2.1.3         # Find DB file path on device

  # ── AI / Networking ───────────────────────────────────────────────────────
  http: ^1.2.1                  # Gemini API calls

  # ── State management ─────────────────────────────────────────────────────
  provider: ^6.1.2

  # ── Storage ───────────────────────────────────────────────────────────────
  shared_preferences: ^2.3.2    # Store API key, settings

  # ── Charts ────────────────────────────────────────────────────────────────
  fl_chart: ^0.69.0

  # ── Utilities ─────────────────────────────────────────────────────────────
  intl: ^0.19.0                 # Date formatting
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
